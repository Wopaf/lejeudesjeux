<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Jeu des Jeux</title>
    <link rel="icon" href="medias-lejeudesjeux/fav.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&family=Nunito:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="lejeudesjeux.css">
</head>
<body>

<div class="page-fade"></div>

<!-- ══ MODAL UTILISATEUR ══ -->
<div id="user-modal" class="user-modal">
    <div class="user-modal-panel">
        <div class="user-modal-icon">🎮</div>
        <h1 class="user-modal-title">Qui es-tu ?</h1>
        <p class="user-modal-sub">Choisis ton profil pour commencer</p>
        <div class="user-choices">
            <button class="user-choice-btn" data-user="matthias">
                <span class="user-choice-avatar">M</span>
                <span class="user-choice-name">Matthias</span>
            </button>
            <button class="user-choice-btn" data-user="valentin">
                <span class="user-choice-avatar">V</span>
                <span class="user-choice-name">Valentin</span>
            </button>
            <button class="user-choice-btn" data-user="morgane">
                <span class="user-choice-avatar">Mo</span>
                <span class="user-choice-name">Morgane</span>
            </button>
            <button class="user-choice-btn" data-user="tom">
                <span class="user-choice-avatar">T</span>
                <span class="user-choice-name">Tom</span>
            </button>
        </div>
        <span class="app-version" id="app-version"></span>
    </div>
</div>

<!-- ══ MODAL PROFIL ══ -->
<div id="profile-modal" class="profile-modal hidden">
    <div class="profile-overlay" id="profile-overlay"></div>
    <div class="profile-panel">
        <div class="profile-header">
            <h2 class="profile-title">Mon profil</h2>
            <button class="profile-close" id="profile-close">✕</button>
        </div>
        <div class="profile-body">
            <div class="profile-user-row">
                <div class="profile-avatar" id="profile-avatar"></div>
                <span class="profile-name" id="profile-name"></span>
            </div>
            <div class="profile-section">
                <span class="profile-label">Couleur d'accent</span>
                <div class="profile-colors" id="profile-colors"></div>
            </div>
            <div class="profile-section">
                <span class="profile-label">Note personnelle</span>
                <textarea class="profile-note" id="profile-note" placeholder="Écris quelque chose…"></textarea>
            </div>
        </div>
        <div class="profile-footer">
            <button class="profile-logout-btn" id="profile-logout-btn">Se déconnecter</button>
        </div>
    </div>
</div>

<!-- ══ MODAL CONFIRMATION TIMER ══ -->
<div id="confirm-modal" class="confirm-modal hidden">
    <div class="confirm-overlay"></div>
    <div class="confirm-panel">
        <div class="confirm-thumb" id="confirm-thumb"></div>
        <div class="confirm-text">
            <p class="confirm-label">Lancer le timer pour</p>
            <h2 class="confirm-title" id="confirm-game-name"></h2>
            <p class="confirm-hint">Tu ne pourras pas changer de jeu tant qu'il tourne.</p>
        </div>
        <div class="confirm-btns">
            <button class="confirm-btn confirm-btn--cancel" id="confirm-cancel">Annuler</button>
            <button class="confirm-btn confirm-btn--ok" id="confirm-ok"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M320-273v-414q0-17 12-28.5t28-11.5q5 0 10.5 1.5T381-721l326 207q9 6 13.5 15t4.5 19q0 10-4.5 19T707-446L381-239q-5 3-10.5 4.5T360-233q-16 0-28-11.5T320-273Zm80-207Zm0 134 210-134-210-134v268Z"/></svg> Lancer</button>
        </div>
    </div>
</div>

<!-- ══ MODAL VISITER ══ -->
<div id="visit-modal" class="visit-modal hidden">
    <div class="visit-overlay" id="visit-overlay"></div>
    <div class="visit-panel">
        <div class="visit-header">
            <h2 class="visit-title">Joueurs</h2>
            <button class="visit-close" id="visit-close">✕</button>
        </div>
        <div class="visit-users" id="visit-users"></div>
    </div>
</div>

<!-- ══ APPLICATION ══ -->
<div id="app" class="app hidden">

    <header class="app-header">
        <div class="header-left">
            <div class="user-badge" id="user-badge">
                <span class="user-badge-avatar" id="user-badge-avatar">M</span>
                <span class="user-badge-name" id="user-badge-name">Matthias</span>
            </div>
            <span class="user-note-badge hidden" id="user-note-badge"></span>
        </div>
        <button class="visit-btn" id="visit-btn">
            <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M360-240Zm-240 80q-33 0-56.5-23.5T40-240v-32q0-34 17.5-62.5T104-378q62-31 126-46.5T360-440q23 0 45.5 2t45.5 6q14 2 20 15.5t1 27.5q-5 14-19 24.5t-40 7.5q-14-2-27-2.5t-26-.5q-56 0-111 13.5T140-306q-9 5-14.5 14t-5.5 20v32h295q20 0 30 12.5t10 27.5q0 15-10 27.5T415-160H120Zm127-367q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47Zm466 0q-47 47-113 47-11 0-28-2.5t-28-5.5q27-32 41.5-71t14.5-81q0-42-14.5-81T544-792q14-5 28-6.5t28-1.5q66 0 113 47t47 113q0 66-47 113Zm-296.5-56.5Q440-607 440-640t-23.5-56.5Q393-720 360-720t-56.5 23.5Q280-673 280-640t23.5 56.5Q327-560 360-560t56.5-23.5ZM360-640Zm376.5 420q22.5-20 23.5-60 1-34-22.5-57T680-360q-34 0-57 23t-23 57q0 34 23 57t57 23q34 0 56.5-20ZM680-120q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 23-5.5 43.5T818-198l74 74q11 11 11 28t-11 28q-11 11-28 11t-28-11l-74-74q-18 11-38.5 16.5T680-120Z"/></svg>
            Visiter
        </button>
    </header>

    <div class="grid-wrap">
        <div class="jeux-scroll-wrap">
            <main class="jeux-grid" id="jeux-grid"></main>
        </div>
        <div class="grid-overlay" id="grid-overlay"></div>
    </div>

    <div class="footer-bar">
        <div class="time-dist" id="time-dist">
            <div class="time-dist-slots-row">
                <div class="time-dist-slots" id="time-dist-slots"></div>
                <div class="time-dist-total-wrap">
                    <span class="time-dist-total-label">Total</span>
                    <span class="time-dist-total" id="app-total-val">00:00:00</span>
                </div>
            </div>
            <div class="time-dist-bar" id="time-dist-bar"></div>
        </div>
        <div class="footer-info">
            <div class="footer-selected-wrap">
                <span class="footer-selected-name" id="footer-selected-name">—</span>
            </div>
            <div class="footer-timer-wrap">
                <div class="footer-timer-row">
                    <span class="footer-timer-val" id="footer-timer-val">00:00:00</span>
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M400-840q-17 0-28.5-11.5T360-880q0-17 11.5-28.5T400-920h160q17 0 28.5 11.5T600-880q0 17-11.5 28.5T560-840H400Zm108.5 428.5Q520-423 520-440v-160q0-17-11.5-28.5T480-640q-17 0-28.5 11.5T440-600v160q0 17 11.5 28.5T480-400q17 0 28.5-11.5Zm-168 303Q275-137 226-186t-77.5-114.5Q120-366 120-440t28.5-139.5Q177-645 226-694t114.5-77.5Q406-800 480-800q62 0 119 20t107 58l28-28q11-11 28-11t28 11q11 11 11 28t-11 28l-28 28q38 50 58 107t20 119q0 74-28.5 139.5T734-186q-49 49-114.5 77.5T480-80q-74 0-139.5-28.5ZM678-242q82-82 82-198t-82-198q-82-82-198-82t-198 82q-82 82-82 198t82 198q82 82 198 82t198-82ZM480-440Z"/></svg>
                </div>
            </div>
        </div>
        <button class="launch-btn" id="launch-btn" disabled>
            <span class="launch-btn-bg" id="launch-btn-bg"></span>
            <span id="launch-btn-icon"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M320-273v-414q0-17 12-28.5t28-11.5q5 0 10.5 1.5T381-721l326 207q9 6 13.5 15t4.5 19q0 10-4.5 19T707-446L381-239q-5 3-10.5 4.5T360-233q-16 0-28-11.5T320-273Zm80-207Zm0 134 210-134-210-134v268Z"/></svg></span>
            <span id="launch-btn-label">Lancer le timer</span>
        </button>
    </div>

</div>

<!-- Infobulle progressbar -->
<div id="dist-tooltip" class="dist-tooltip hidden">
    <span class="dist-tooltip-name" id="dist-tooltip-name"></span>
    <span class="dist-tooltip-timer" id="dist-tooltip-timer"></span>
    <div class="dist-tooltip-arrow"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="lejeudesjeux.js"></script>

</body>
</html>
